name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v0.1.2)"
        required: true
        type: string
      ref:
        description: "Git ref to build (commit SHA or branch)"
        required: true
        type: string

jobs:
  build-desktop:
    name: "Build desktop (${{ matrix.label }})"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-arm
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-target: darwin-arm64
            engine-target: aarch64-apple-darwin
          - platform: macos-latest
            label: macos-intel
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-target: darwin-x64
            engine-target: x86_64-apple-darwin
          - platform: windows-latest
            label: windows
            args: ""
            rust-targets: ""
            sidecar-target: ""
            engine-target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            label: linux
            args: ""
            rust-targets: ""
            sidecar-target: ""
            engine-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Jiansen/Vibeful
          ref: ${{ inputs.ref }}
          ssh-key: ${{ secrets.VIBEFUL_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build browser sidecar
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIDECAR_TARGET: ${{ matrix.sidecar-target }}
        run: bash desktop/sidecar-browser/build.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target\nengine -> target"
          prefix-key: "v3-sidecar"
          shared-key: ${{ matrix.label }}

      - name: Build engine
        shell: bash
        run: |
          echo "=== Building vibeful-engine for ${{ matrix.engine-target }} ==="
          cd engine
          if [ -n "${{ matrix.args }}" ]; then
            cargo build --release --target ${{ matrix.engine-target }}
            ENGINE_BIN="target/${{ matrix.engine-target }}/release/vibeful-engine"
          else
            cargo build --release
            ENGINE_BIN="target/release/vibeful-engine"
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            ENGINE_BIN="${ENGINE_BIN}.exe"
          fi
          echo "Engine binary: $ENGINE_BIN ($(du -sh "$ENGINE_BIN" | cut -f1))"
          ls -la "$ENGINE_BIN"

          mkdir -p ../desktop/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$ENGINE_BIN" "../desktop/src-tauri/binaries/vibeful-engine-${{ matrix.engine-target }}.exe"
          else
            cp "$ENGINE_BIN" "../desktop/src-tauri/binaries/vibeful-engine-${{ matrix.engine-target }}"
          fi
          echo "Copied to binaries/vibeful-engine-${{ matrix.engine-target }}"
          ls -la ../desktop/src-tauri/binaries/

      - name: Prepare voice-bin placeholder
        run: mkdir -p desktop/src-tauri/voice-bin
        shell: bash

      - name: Clean stale bundle (force Tauri to re-copy resources)
        shell: bash
        run: |
          echo "==> Removing stale bundle directories to force fresh resource bundling"
          find desktop/src-tauri/target -path "*/release/bundle" -type d -exec rm -rf {} + 2>/dev/null || true
          find desktop/src-tauri/target -name ".fingerprint" -path "*/vibeful*" -exec rm -rf {} + 2>/dev/null || true
          touch desktop/src-tauri/build.rs
          echo "==> Clean complete"

      - name: TypeScript type check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Verify browser sidecar
        shell: bash
        run: |
          SIDECAR="desktop/src-tauri/sidecar"
          echo "=== Browser sidecar verification ==="
          NODE_BIN="$SIDECAR/node"
          [ -f "$SIDECAR/node.exe" ] && NODE_BIN="$SIDECAR/node.exe"
          if [ ! -f "$NODE_BIN" ]; then
            echo "::error::Node.js binary not found in sidecar"
            exit 1
          fi
          echo "Node.js: $("$NODE_BIN" --version)"
          echo "Node.js arch: $("$NODE_BIN" -e "console.log(process.arch)")"
          MCP_CLI="$SIDECAR/node_modules/@playwright/mcp/cli.js"
          if [ ! -f "$MCP_CLI" ]; then
            echo "::error::Playwright MCP CLI not found"
            exit 1
          fi
          echo "Playwright MCP CLI: present"
          BROWSERS="$SIDECAR/.local-browsers"
          if [ -d "$BROWSERS" ]; then
            echo "Bundled browsers: $(du -sh "$BROWSERS" | cut -f1)"
          else
            TARBALL="$SIDECAR/.local-browsers.tar.gz"
            if [ -f "$TARBALL" ]; then
              echo "Bundled browsers (tar.gz): $(du -sh "$TARBALL" | cut -f1)"
            else
              echo "::error::No bundled browsers found"
              exit 1
            fi
          fi
          du -sh "$SIDECAR"
          echo "=== Engine binary verification ==="
          ls -la desktop/src-tauri/binaries/
          echo "==="

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ inputs.tag_name }}
          releaseName: 'Vibeful ${{ inputs.tag_name }}'
          releaseBody: |
            ## Vibeful Desktop ${{ inputs.tag_name }}

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (M1+) | `Vibeful_*_aarch64.dmg` |
            | macOS Intel | `Vibeful_*_x64.dmg` |
            | Windows 64-bit | `Vibeful_*_x64-setup.exe` / `.msi` |
            | Linux (Debian/Ubuntu) | `Vibeful_*_amd64.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Verify bundle size
        shell: bash
        run: |
          set -eo pipefail
          echo "=== Bundle size verification ==="
          BUNDLE_DIR="desktop/src-tauri/target"
          if [ -n "${{ matrix.args }}" ]; then
            TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
            BUNDLE_DIR="$BUNDLE_DIR/$TARGET/release/bundle"
          else
            BUNDLE_DIR="$BUNDLE_DIR/release/bundle"
          fi
          echo "Bundle directory: $BUNDLE_DIR"
          du -sh "$BUNDLE_DIR" 2>/dev/null || { echo "::error::Bundle dir not found"; exit 1; }

          FAIL=0
          while IFS= read -r f; do
            SIZE=$(du -sm "$f" | cut -f1)
            echo "  $(basename "$f"): ${SIZE}MB"
            if [ "$SIZE" -lt 50 ]; then
              echo "::error::Bundle $(basename "$f") is only ${SIZE}MB — engine or sidecar likely missing!"
              FAIL=1
            fi
          done < <(find "$BUNDLE_DIR" -maxdepth 2 -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null)

          if [ "$FAIL" -eq 1 ]; then
            echo "=== Debugging: .app contents ==="
            APP_DIR=$(find "$BUNDLE_DIR" -name "*.app" -type d | head -1)
            if [ -n "$APP_DIR" ]; then
              echo "Resources:"
              ls -la "$APP_DIR/Contents/Resources/" 2>/dev/null || echo "  (not found)"
              echo "Sidecar:"
              ls -la "$APP_DIR/Contents/Resources/sidecar/" 2>/dev/null || echo "  (not found)"
              echo "MacOS binaries:"
              ls -la "$APP_DIR/Contents/MacOS/" 2>/dev/null || echo "  (not found)"
            fi
            exit 1
          fi
          echo "=== All bundles OK ==="
