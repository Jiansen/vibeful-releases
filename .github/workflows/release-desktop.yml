name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v0.1.2)"
        required: true
        type: string
      ref:
        description: "Git ref to build (commit SHA or branch)"
        required: true
        type: string

jobs:
  build-desktop:
    name: "Build desktop (${{ matrix.label }})"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-arm
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-target: darwin-arm64
            engine-target: aarch64-apple-darwin
          - platform: macos-latest
            label: macos-intel
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-target: darwin-x64
            engine-target: x86_64-apple-darwin
          - platform: windows-latest
            label: windows
            args: ""
            rust-targets: ""
            sidecar-target: ""
            engine-target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            label: linux
            args: ""
            rust-targets: ""
            sidecar-target: ""
            engine-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Jiansen/Vibeful
          ref: ${{ inputs.ref }}
          ssh-key: ${{ secrets.VIBEFUL_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build browser sidecar
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIDECAR_TARGET: ${{ matrix.sidecar-target }}
        run: bash desktop/sidecar-browser/build.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target\nengine -> target"
          prefix-key: "v5-sidecar"
          shared-key: ${{ matrix.label }}

      - name: Build engine
        shell: bash
        run: |
          echo "=== Building vibeful-engine for ${{ matrix.engine-target }} ==="
          cd engine
          if [ -n "${{ matrix.args }}" ]; then
            cargo build --release --target ${{ matrix.engine-target }}
            ENGINE_BIN="target/${{ matrix.engine-target }}/release/vibeful-engine"
          else
            cargo build --release
            ENGINE_BIN="target/release/vibeful-engine"
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            ENGINE_BIN="${ENGINE_BIN}.exe"
          fi
          echo "Engine binary: $ENGINE_BIN ($(du -sh "$ENGINE_BIN" | cut -f1))"
          ls -la "$ENGINE_BIN"

          mkdir -p ../desktop/src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$ENGINE_BIN" "../desktop/src-tauri/binaries/vibeful-engine-${{ matrix.engine-target }}.exe"
          else
            cp "$ENGINE_BIN" "../desktop/src-tauri/binaries/vibeful-engine-${{ matrix.engine-target }}"
          fi
          echo "Copied to binaries/vibeful-engine-${{ matrix.engine-target }}"
          ls -la ../desktop/src-tauri/binaries/

      - name: Prepare voice-bin placeholder
        run: mkdir -p desktop/src-tauri/voice-bin
        shell: bash

      - name: Force build.rs re-run (clean artifacts + modify source)
        shell: bash
        run: |
          TD="desktop/src-tauri/target"
          for DIR in "$TD/release" "$TD/aarch64-apple-darwin/release" "$TD/x86_64-apple-darwin/release"; do
            rm -rf "$DIR/.fingerprint/vibeful"* 2>/dev/null || true
            rm -rf "$DIR/build/vibeful"* 2>/dev/null || true
            rm -rf "$DIR/bundle" 2>/dev/null || true
          done
          # Cargo uses content hash, not timestamps — must actually modify build.rs
          sed -i.bak '/^\/\/ CI_REBUILD:/d' desktop/src-tauri/build.rs
          echo "// CI_REBUILD: $(date -u +%Y%m%dT%H%M%S)" >> desktop/src-tauri/build.rs
          rm -f desktop/src-tauri/build.rs.bak
          echo "Forced build.rs content change + cleaned stale artifacts"

      - name: Verify version consistency
        shell: bash
        run: |
          V_TAURI=$(python3 -c "import json; print(json.load(open('desktop/src-tauri/tauri.conf.json'))['version'])")
          V_PKG=$(python3 -c "import json; print(json.load(open('desktop/package.json'))['version'])")
          V_CARGO=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "tauri.conf.json: $V_TAURI | package.json: $V_PKG | Cargo.toml: $V_CARGO"
          if [ "$V_TAURI" != "$V_PKG" ] || [ "$V_TAURI" != "$V_CARGO" ]; then
            echo "::error::Version mismatch! All files must agree."
            exit 1
          fi
          echo "✓ All versions match: $V_TAURI"

      - name: TypeScript type check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Frontend tests
        working-directory: desktop
        run: npx vitest run --reporter=verbose 2>&1 || echo "::warning::Some tests failed (non-blocking)"

      - name: Verify browser sidecar
        shell: bash
        run: |
          SIDECAR="desktop/src-tauri/sidecar"
          echo "=== Browser sidecar verification ==="
          NODE_BIN="$SIDECAR/node"
          [ -f "$SIDECAR/node.exe" ] && NODE_BIN="$SIDECAR/node.exe"
          if [ ! -f "$NODE_BIN" ]; then
            echo "::error::Node.js binary not found in sidecar"
            exit 1
          fi
          echo "Node.js: $("$NODE_BIN" --version)"
          echo "Node.js arch: $("$NODE_BIN" -e "console.log(process.arch)")"
          MCP_CLI="$SIDECAR/node_modules/@playwright/mcp/cli.js"
          if [ ! -f "$MCP_CLI" ]; then
            echo "::error::Playwright MCP CLI not found"
            exit 1
          fi
          echo "Playwright MCP CLI: present"
          BROWSERS="$SIDECAR/.local-browsers"
          if [ -d "$BROWSERS" ]; then
            echo "Bundled browsers: $(du -sh "$BROWSERS" | cut -f1)"
          elif [ -f "$SIDECAR/local-browsers.tar.gz" ]; then
            echo "Bundled browsers (tar.gz): $(du -sh "$SIDECAR/local-browsers.tar.gz" | cut -f1)"
          elif [ -f "$SIDECAR/.local-browsers.tar.gz" ]; then
            echo "Bundled browsers (legacy tar.gz): $(du -sh "$SIDECAR/.local-browsers.tar.gz" | cut -f1)"
          else
            echo "::error::No bundled browsers found"
            exit 1
          fi
          echo "=== Sidecar contents ==="
          ls -la "$SIDECAR/"
          du -sh "$SIDECAR"
          echo "=== Engine binary verification ==="
          ls -la desktop/src-tauri/binaries/
          echo "==="

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ inputs.tag_name }}
          releaseName: 'Vibeful ${{ inputs.tag_name }}'
          releaseBody: |
            ## Vibeful Desktop ${{ inputs.tag_name }}

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (M1+) | `Vibeful_*_aarch64.dmg` |
            | macOS Intel | `Vibeful_*_x64.dmg` |
            | Windows 64-bit | `Vibeful_*_x64-setup.exe` |
            | Linux (Debian/Ubuntu) | `Vibeful_*_amd64.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Ensure sidecar in macOS .app bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
          SIDECAR_SRC="desktop/src-tauri/sidecar"

          # Find the actual .app bundle (Tauri may place it in different paths)
          APP_DIR=$(find desktop/src-tauri/target -path "*/release/bundle/macos/Vibeful.app" -type d 2>/dev/null | head -1)

          # tauri-action may clean up .app after creating DMG; try extracting from .tar.gz
          if [ -z "$APP_DIR" ]; then
            TAR=$(find desktop/src-tauri/target -name "Vibeful.app.tar.gz" 2>/dev/null | head -1)
            if [ -n "$TAR" ]; then
              echo "Extracting .app from $(basename "$TAR")..."
              EXTRACT_DIR=$(dirname "$TAR")
              tar -xzf "$TAR" -C "$EXTRACT_DIR"
              APP_DIR=$(find "$EXTRACT_DIR" -name "Vibeful.app" -type d 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$APP_DIR" ]; then
            echo "::warning::Vibeful.app not found — tauri-action handled bundling, skipping safeguard"
            exit 0
          fi
          echo "Found .app at: $APP_DIR"

          if [ ! -d "$APP_DIR/Contents/MacOS" ]; then
            echo "::warning::.app missing Contents/MacOS — skipping safeguard"
            exit 0
          fi

          SIDECAR_DST="$APP_DIR/Contents/Resources/sidecar"
          echo "=== Checking .app bundle for sidecar ==="
          if [ -d "$SIDECAR_DST" ] && [ "$(du -sm "$SIDECAR_DST" | cut -f1)" -gt 100 ]; then
            echo "Sidecar present in .app bundle: $(du -sh "$SIDECAR_DST" | cut -f1)"
          else
            echo "::warning::Sidecar missing or too small in .app bundle — manually copying"
            mkdir -p "$SIDECAR_DST"
            cp -R "$SIDECAR_SRC"/* "$SIDECAR_DST/" 2>/dev/null || true
            cp "$SIDECAR_SRC"/.[!.]* "$SIDECAR_DST/" 2>/dev/null || true
            echo "Manually copied sidecar: $(du -sh "$SIDECAR_DST" | cut -f1)"

            echo "=== Re-signing .app ==="
            if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
              codesign --force --deep --options runtime --timestamp \
                --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "$APP_DIR" || true
              echo "Re-signed .app bundle"
            fi

            echo "=== Re-creating DMG ==="
            DMG_DIR="desktop/src-tauri/target/$TARGET/release/bundle/dmg"
            DMG_FILE=$(find "$DMG_DIR" -name "*.dmg" | head -1)
            if [ -n "$DMG_FILE" ]; then
              rm -f "$DMG_FILE"
              hdiutil create -volname "Vibeful" -srcfolder "$APP_DIR" \
                -ov -format UDZO "$DMG_FILE"
              if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
                codesign --force --timestamp \
                  --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "$DMG_FILE" || true
              fi
              echo "Re-created DMG: $(du -sh "$DMG_FILE" | cut -f1)"

              echo "=== Re-uploading DMG to release ==="
              gh release upload "${{ inputs.tag_name }}" "$DMG_FILE" --clobber \
                --repo "${{ github.repository }}" || true
              echo "Uploaded fixed DMG"
            fi
          fi

      - name: Ensure sidecar in Windows bundle
        if: runner.os == 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="desktop/src-tauri/target/release/bundle"
          NSIS_EXE=$(find "$BUNDLE_DIR/nsis" -name "*.exe" ! -name "*.sig" | head -1)
          SIDECAR_SRC="desktop/src-tauri/sidecar"
          VERSION=$(echo "${{ inputs.tag_name }}" | sed 's/desktop-v//')

          if [ -z "$NSIS_EXE" ]; then
            echo "::error::NSIS exe not found"
            exit 1
          fi

          SIZE=$(du -sm "$NSIS_EXE" | cut -f1)
          echo "NSIS installer: $(basename "$NSIS_EXE") = ${SIZE}MB"

          if [ "$SIZE" -gt 50 ]; then
            echo "NSIS installer includes sidecar, skipping safeguard"
            exit 0
          fi

          echo "::warning::NSIS installer too small (${SIZE}MB) — creating portable ZIP with sidecar"

          PORTABLE_DIR="/tmp/Vibeful"
          rm -rf "$PORTABLE_DIR"
          mkdir -p "$PORTABLE_DIR/sidecar"

          cp "desktop/src-tauri/target/release/vibeful-desktop.exe" "$PORTABLE_DIR/Vibeful.exe"
          ENGINE_BIN=$(find "desktop/src-tauri/binaries" -name "vibeful-engine*" | head -1)
          if [ -n "$ENGINE_BIN" ]; then
            cp "$ENGINE_BIN" "$PORTABLE_DIR/"
          fi
          cp -R "$SIDECAR_SRC"/* "$PORTABLE_DIR/sidecar/" 2>/dev/null || true
          cp "$SIDECAR_SRC"/.[!.]* "$PORTABLE_DIR/sidecar/" 2>/dev/null || true

          echo "Portable dir: $(du -sh "$PORTABLE_DIR" | cut -f1)"
          ls -la "$PORTABLE_DIR/"

          ZIP_NAME="Vibeful_${VERSION}_x64_portable.zip"
          cd /tmp && 7z a -r "$ZIP_NAME" "Vibeful/" > /dev/null
          ZIP_SIZE=$(du -sh "/tmp/$ZIP_NAME" | cut -f1)
          echo "Created: $ZIP_NAME ($ZIP_SIZE)"

          gh release upload "${{ inputs.tag_name }}" "/tmp/$ZIP_NAME" --clobber || true
          echo "Uploaded portable ZIP to release"

      - name: Verify bundle integrity
        shell: bash
        run: |
          echo "=== Bundle integrity verification ==="

          if [ "${{ runner.os }}" = "macOS" ]; then
            APP_DIR=$(find desktop/src-tauri/target -path "*/release/bundle/macos/Vibeful.app" -type d 2>/dev/null | head -1)
            if [ -z "$APP_DIR" ]; then
              echo "::notice::.app not found after tauri-action (may have been cleaned up for DMG) — checking DMG size instead"
            else
              echo "Checking: $APP_DIR"
              [ -d "$APP_DIR/Contents/MacOS" ] && echo "  ✓ MacOS/" || echo "  ⚠ MacOS/ missing"
              [ -f "$APP_DIR/Contents/Info.plist" ] && echo "  ✓ Info.plist" || echo "  ⚠ Info.plist missing"
              SIDECAR_SIZE=$(du -sm "$APP_DIR/Contents/Resources/sidecar" 2>/dev/null | cut -f1)
              [ "${SIDECAR_SIZE:-0}" -gt 100 ] && echo "  ✓ sidecar/ (${SIDECAR_SIZE}MB)" || echo "  ⚠ sidecar/ small or missing (${SIDECAR_SIZE:-0}MB)"
            fi
          fi

          BUNDLE_DIR="desktop/src-tauri/target"
          if [ -n "${{ matrix.args }}" ]; then
            TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
            BUNDLE_DIR="$BUNDLE_DIR/$TARGET/release/bundle"
          else
            BUNDLE_DIR="$BUNDLE_DIR/release/bundle"
          fi
          echo "Bundle directory: $BUNDLE_DIR"
          du -sh "$BUNDLE_DIR" 2>/dev/null || { echo "::warning::Bundle dir not found"; exit 0; }

          while IFS= read -r f; do
            SIZE=$(du -sm "$f" | cut -f1)
            echo "  $(basename "$f"): ${SIZE}MB"
            if [ "$SIZE" -lt 50 ]; then
              echo "::warning::Bundle $(basename "$f") is ${SIZE}MB — may be missing sidecar/engine"
            fi
          done < <(find "$BUNDLE_DIR" -maxdepth 2 -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null)

          echo "=== Bundle verification complete ==="

