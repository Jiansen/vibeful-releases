name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v0.1.2)"
        required: true
        type: string
      ref:
        description: "Git ref to build (commit SHA or branch)"
        required: true
        type: string

jobs:
  build-desktop:
    name: "Build desktop (${{ matrix.label }})"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-arm
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-target: darwin-arm64
          - platform: macos-latest
            label: macos-intel
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar-target: darwin-x64
          - platform: windows-latest
            label: windows
            args: ""
            rust-targets: ""
            sidecar-target: ""
          - platform: ubuntu-22.04
            label: linux
            args: ""
            rust-targets: ""
            sidecar-target: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: Jiansen/Vibeful
          ref: ${{ inputs.ref }}
          ssh-key: ${{ secrets.VIBEFUL_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build browser sidecar
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIDECAR_TARGET: ${{ matrix.sidecar-target }}
        run: bash desktop/sidecar-browser/build.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"
          prefix-key: "v3-sidecar"
          shared-key: ${{ matrix.label }}

      - name: Prepare voice-bin placeholder
        run: mkdir -p desktop/src-tauri/voice-bin
        shell: bash

      - name: Force build.rs re-run to pick up sidecar resources
        shell: bash
        run: |
          find desktop/src-tauri/target -name ".fingerprint" -path "*/vibeful*" -exec rm -rf {} + 2>/dev/null || true
          touch desktop/src-tauri/build.rs

      - name: TypeScript type check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Verify browser sidecar
        shell: bash
        run: |
          SIDECAR="desktop/src-tauri/sidecar"
          echo "=== Browser sidecar verification ==="
          NODE_BIN="$SIDECAR/node"
          [ -f "$SIDECAR/node.exe" ] && NODE_BIN="$SIDECAR/node.exe"
          if [ ! -f "$NODE_BIN" ]; then
            echo "Node.js binary not found in sidecar"
            exit 1
          fi
          echo "Node.js: $("$NODE_BIN" --version)"
          echo "Node.js arch: $("$NODE_BIN" -e "console.log(process.arch)")"
          MCP_CLI="$SIDECAR/node_modules/@playwright/mcp/cli.js"
          if [ ! -f "$MCP_CLI" ]; then
            echo "Playwright MCP CLI not found"
            exit 1
          fi
          echo "Playwright MCP CLI: present"
          BROWSERS="$SIDECAR/.local-browsers"
          if [ -d "$BROWSERS" ]; then
            echo "Bundled browsers: $(du -sh "$BROWSERS" | cut -f1)"
          else
            TARBALL="$SIDECAR/.local-browsers.tar.gz"
            if [ -f "$TARBALL" ]; then
              echo "Bundled browsers (tar.gz): $(du -sh "$TARBALL" | cut -f1)"
            else
              echo "WARNING: No bundled browsers"
            fi
          fi
          du -sh "$SIDECAR"
          echo "==="

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ inputs.tag_name }}
          releaseName: 'Vibeful ${{ inputs.tag_name }}'
          releaseBody: |
            ## Vibeful Desktop ${{ inputs.tag_name }}

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (M1+) | `Vibeful_*_aarch64.dmg` |
            | macOS Intel | `Vibeful_*_x64.dmg` |
            | Windows 64-bit | `Vibeful_*_x64-setup.exe` / `.msi` |
            | Linux (Debian/Ubuntu) | `Vibeful_*_amd64.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Verify bundle size
        shell: bash
        run: |
          echo "=== Bundle size verification ==="
          BUNDLE_DIR="desktop/src-tauri/target"
          if [ -n "${{ matrix.args }}" ]; then
            TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
            BUNDLE_DIR="$BUNDLE_DIR/$TARGET/release/bundle"
          else
            BUNDLE_DIR="$BUNDLE_DIR/release/bundle"
          fi
          echo "Bundle directory: $BUNDLE_DIR"
          du -sh "$BUNDLE_DIR" 2>/dev/null || echo "Bundle dir not found"
          find "$BUNDLE_DIR" -maxdepth 2 -type f -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app" 2>/dev/null | while read f; do
            SIZE=$(du -sm "$f" | cut -f1)
            echo "  $f: ${SIZE}MB"
            if [ "$SIZE" -lt 100 ]; then
              echo "::error::Bundle $f is only ${SIZE}MB — sidecar likely missing!"
              exit 1
            fi
          done
